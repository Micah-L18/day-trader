appId: com.daytrader.terminal
productName: Daytrader Terminal
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!scripts/*'
  - '!tests/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!vitest.config.{js,ts,mjs,cjs}'
  - '!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{PLAN.md,BUILD_PLAN.md,CLAUDE.md,README.md}'
asarUnpack:
  - resources/**
win:
  target: nsis
  artifactName: ${productName}-${version}-setup.${ext}
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target:
    - target: dmg
  category: public.app-category.finance
  artifactName: ${productName}-${version}.${ext}
linux:
  target:
    - AppImage
    - deb
  category: Finance
  maintainer: Daytrader Terminal <noreply@daytrader.local>
  artifactName: ${productName}-${version}.${ext}
npmRebuild: false
publish: null
